<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavorAfrik - Carnet culinaire d'Afrique Centrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vert-afrik': '#1a472a',
                        'orange-afrik': '#f4a261',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-vert-afrik to-orange-afrik min-h-screen">
    
    <!-- Conteneur principal -->
    <div class="min-h-screen flex flex-col items-center justify-center px-4">
        
        <!-- Logo / Titre -->
        <div class="text-center mb-12">
            <div class="text-7xl mb-4">🍲✨</div>
            <h1 class="text-5xl md:text-6xl font-bold text-white mb-2">SavorAfrik</h1>
            <p class="text-white text-xl opacity-90">Savoure, Note et Partage</p>
            <p class="text-white/80 text-sm mt-2">🇨🇲 🇨🇬 🇬🇦 🇨🇫 🇹🇩 🇬🇶</p>
        </div>
        
        <!-- Carte blanche avec le formulaire -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-2xl w-full">
            
            <!-- Nouveau champ de recherche -->
            <div class="mb-8">
                <label class="block text-vert-afrik font-semibold mb-2 text-lg">
                    🍽️ Entrez le nom d'un met
                </label>
                <div class="flex gap-3">
                    <input type="text" 
                           id="nomPlat"
                           placeholder="Ex: Ndolé, Poulet DG, Sangah, Moamba..."
                           class="flex-1 px-5 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-orange-afrik transition text-lg">
                    <button onclick="rechercherPlat()"
                            class="bg-orange-afrik text-white px-6 py-3 rounded-xl font-semibold hover:bg-opacity-90 transition transform hover:scale-105">
                        🔍 Découvrir
                    </button>
                </div>
                <p class="text-gray-500 text-sm mt-2">✨ Découvre la recette, l'image et les statistiques du plat</p>
            </div>
            
        </div>
        
        <!-- Petite description -->
        <div class="text-center text-white/70 text-sm mt-8">
            <p>Application de collecte et analyse de données culinaires d'Afrique Centrale</p>
            <p class="mt-1">TP INF232 - EC2</p>
        </div>
        
    </div>
    
    <script>
        function rechercherPlat() {
            const plat = document.getElementById('nomPlat').value.trim();
            
            if (plat === "") {
                alert("Veuillez entrer le nom d'un plat");
                return;
            }
            
            // Rediriger vers la page recette avec le nom du plat dans l'URL
            window.location.href = `recette.html?plat=${encodeURIComponent(plat)}`;
        }
        
        // Permettre la recherche avec la touche Entrée
        document.getElementById('nomPlat').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                rechercherPlat();
            }
        });
    </script>
    
</body>
</html>
